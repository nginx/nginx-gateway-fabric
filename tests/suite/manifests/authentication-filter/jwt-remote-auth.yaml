apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: jwt-remote-auth
spec:
  type: JWT
  jwt:
    realm: "JWT Remote Authentication"
    source: Remote
    remote:
      uri: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/myrealm/protocol/openid-connect/certs
      tls:
        secretRef:
          name: jwks-client-cert
        verify: true
        sni: true
    keyCache: 10m
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jwt-remote-cafe-routes
spec:
  parentRefs:
    - name: auth-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jwt-remote-coffee
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: jwt-remote-auth
    - matches:
        - path:
            type: PathPrefix
            value: /jwt-remote-tea
      backendRefs:
        - name: tea
          port: 80
