---
# Secrets for OIDC authorization tests (reuse existing Keycloak clients)
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-authz-coffee-client-secret
type: Opaque
data:
  client-secret: b2lkYy1jb2ZmZWUtY2xpZW50LXNlY3JldA==
---
# OIDC AuthenticationFilter with authorization: Require Any, Exact match on email claim
apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: oidc-authz-any
spec:
  type: OIDC
  oidc:
    issuer: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway
    clientID: nginx-gateway-coffee
    clientSecretRef:
      name: keycloak-authz-coffee-client-secret
    caCertificateRefs:
      - name: keycloak-ca-secret
    logout:
      uri: /logout-authz-any
    authorization:
      require: Any
      rules:
        - require: Any
          claims:
            - name: email_verified
              match: Exact
              values:
                - "true"
---
# OIDC AuthenticationFilter with authorization: Require All, multiple claims
apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: oidc-authz-all
spec:
  type: OIDC
  oidc:
    issuer: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway
    clientID: nginx-gateway-coffee
    clientSecretRef:
      name: keycloak-authz-coffee-client-secret
    caCertificateRefs:
      - name: keycloak-ca-secret
    logout:
      uri: /logout-authz-all
    authorization:
      require: Any
      rules:
        - require: All
          claims:
            - name: email_verified
              match: Exact
              values:
                - "true"
            - name: preferred_username
              match: Exact
              values:
                - "testuser"
---
# OIDC AuthenticationFilter with authorization: Regex claim matching
apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: oidc-authz-regex
spec:
  type: OIDC
  oidc:
    issuer: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway
    clientID: nginx-gateway-coffee
    clientSecretRef:
      name: keycloak-authz-coffee-client-secret
    caCertificateRefs:
      - name: keycloak-ca-secret
    logout:
      uri: /logout-authz-regex
    authorization:
      require: Any
      rules:
        - require: Any
          claims:
            - name: email
              match: Regex
              values:
                - ".*@example\\.com"
---
# OIDC AuthenticationFilter with authorization: proxySetHeader
apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: oidc-authz-header
spec:
  type: OIDC
  oidc:
    issuer: https://keycloak.authentication-filter.svc.cluster.local:8443/realms/nginx-gateway
    clientID: nginx-gateway-coffee
    clientSecretRef:
      name: keycloak-authz-coffee-client-secret
    caCertificateRefs:
      - name: keycloak-ca-secret
    logout:
      uri: /logout-authz-header
    authorization:
      require: Any
      rules:
        - require: Any
          claims:
            - name: preferred_username
              match: Exact
              values:
                - "testuser"
              proxySetHeader: X-OIDC-User
            - name: email
              match: Exact
              values:
                - "testuser@example.com"
              proxySetHeader: X-OIDC-Email
---
# HTTPRoutes for OIDC authorization tests
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oidc-authz-cafe-route
spec:
  parentRefs:
    - name: auth-gateway
      sectionName: https
  hostnames:
    - cafe.example.com
  rules:
    # Route for Any/Exact authorization
    - matches:
        - path:
            type: PathPrefix
            value: /oidc-authz-any
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: oidc-authz-any
    # Route for All claims authorization
    - matches:
        - path:
            type: PathPrefix
            value: /oidc-authz-all
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: oidc-authz-all
    # Route for Regex authorization
    - matches:
        - path:
            type: PathPrefix
            value: /oidc-authz-regex
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: oidc-authz-regex
    # Route for proxySetHeader authorization
    - matches:
        - path:
            type: PathPrefix
            value: /oidc-authz-header
      backendRefs:
        - name: coffee
          port: 80
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: oidc-authz-header
