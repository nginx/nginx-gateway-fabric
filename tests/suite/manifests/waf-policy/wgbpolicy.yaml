apiVersion: gateway.nginx.org/v1alpha1
kind: WAFGatewayBindingPolicy
metadata:
  name: gateway-waf
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  apPolicySource:
    name: dataguard-blocking
  securityLogs:
  - apLogConfSource:
      name: logconf
    destination:
      type: stderr
