apiVersion: gateway.nginx.org/v1alpha1
kind: WAFGatewayBindingPolicy
metadata:
  name: coffee-route-waf
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: coffee
  apPolicySource:
    name: attack-signatures-blocking
  securityLogs:
  - apLogConfSource:
      name: logconf
    destination:
      type: stderr
