apiVersion: gateway.nginx.org/v1alpha1
kind: WAFPolicy
metadata:
  name: gateway-waf-polling
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  type: HTTP
  policySource:
    httpSource:
      url: http://bundle-server.waf-policy.svc.cluster.local/attack-signatures-blocking.tgz
    polling:
      enabled: true
      interval: 15s
