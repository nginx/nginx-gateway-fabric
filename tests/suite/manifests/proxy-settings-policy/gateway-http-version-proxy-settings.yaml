---
# Sets proxyHTTPVersion: "2" at Gateway scope so that all locations on this Gateway default to
# HTTP/2 upstream proxying. Used to verify that Gateway-level ProxySettingsPolicy is respected
# for every route, and that a more-specific route-level policy can override it.
apiVersion: gateway.nginx.org/v1alpha1
kind: ProxySettingsPolicy
metadata:
  name: gateway-http-version-proxy-settings
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
  proxyHTTPVersion: "2"
