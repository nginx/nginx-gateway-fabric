apiVersion: gateway.nginx.org/v1alpha1
kind: ProxySettingsPolicy
metadata:
  name: coffee-h2-proxy-settings
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: coffee
  proxyHTTPVersion: "2"
---
# Forces proxy_http_version 1.1 for the tea-h2c HTTPRoute, overriding the tea-h2c Service's
# appProtocol: kubernetes.io/h2c setting.
apiVersion: gateway.nginx.org/v1alpha1
kind: ProxySettingsPolicy
metadata:
  name: tea-h2c-override-proxy-settings
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: tea-h2c-route
  proxyHTTPVersion: "1.1"
