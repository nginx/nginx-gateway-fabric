apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-mgr
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollout-mgr
rules:
- apiGroups:
  - "apps"
  resources:
  - deployments
  verbs:
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollout-mgr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollout-mgr
subjects:
- kind: ServiceAccount
  name: rollout-mgr
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: coffee-rollout-mgr
spec:
  schedule: "* * * * *" # every minute
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rollout-mgr
          containers:
          - name: coffee-rollout-mgr
            image: curlimages/curl:8.18.0
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            args:
            - |
                TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                RESTARTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                curl -X PATCH -s -k -v \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-type: application/merge-patch+json" \
                --data-raw "{\"spec\": {\"template\": {\"metadata\": {\"annotations\": {\"kubectl.kubernetes.io/restartedAt\": \"$RESTARTED_AT\"}}}}}" \
                "https://kubernetes.default/apis/apps/v1/namespaces/default/deployments/coffee?fieldManager=kubectl-rollout" 2>&1
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tea-rollout-mgr
spec:
  schedule: "* * * * *" # every minute
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rollout-mgr
          containers:
          - name: coffee-rollout-mgr
            image: curlimages/curl:8.18.0
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            args:
            - |
                TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                RESTARTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                curl -X PATCH -s -k -v \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-type: application/merge-patch+json" \
                --data-raw "{\"spec\": {\"template\": {\"metadata\": {\"annotations\": {\"kubectl.kubernetes.io/restartedAt\": \"$RESTARTED_AT\"}}}}}" \
                "https://kubernetes.default/apis/apps/v1/namespaces/default/deployments/tea?fieldManager=kubectl-rollout" 2>&1
          restartPolicy: OnFailure
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: coffee
spec:
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - "cafe.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /coffee
    backendRefs:
    - name: coffee
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tea
spec:
  parentRefs:
  - name: gateway
    sectionName: https
  hostnames:
  - "cafe.example.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /tea
    backendRefs:
    - name: tea
      port: 80