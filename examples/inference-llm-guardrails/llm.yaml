apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-32b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-32b
  template:
    metadata:
      labels:
        app: vllm-qwen3-32b
        inference.networking.k8s.io/engine-type: vllm
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        imagePullPolicy: IfNotPresent
        args:
        - --model
        - Qwen/Qwen3-32B
        - --port
        - "8000"
        - --max-loras
        - "2"
        - --lora-modules
        - '{"name": "meta-llama/Llama-3.1-8B-Instruct"}'
        - --dataset-path
        - /data/inference-sim-dataset.sqlite3
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        volumeMounts:
        - name: dataset
          mountPath: /data
        resources:
          requests:
            cpu: 10m
            memory: 512Mi
      volumes:
      - name: dataset
        configMap:
          name: inference-sim-dataset
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-32b
spec:
  selector:
    app: vllm-qwen3-32b
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
