apiVersion: gateway.nginx.org/v1alpha2
kind: NginxProxy
metadata:
  name: worker-processes-config
spec:
  # Pin NGINX to a fixed number of worker processes instead of the default "auto"
  # (one worker per CPU core). This is useful when the data plane runs on large
  # nodes but is given a small CPU limit, to avoid spawning a worker per node core.
  # Must be an integer between 1 and 1024. Omit the field to use "auto".
  workerProcesses: 2
