apiVersion: gateway.nginx.org/v1alpha1
kind: AuthenticationFilter
metadata:
  name: oidc-coffee
spec:
  type: OIDC
  oidc:
    clientSecretRef:
      name: keycloak-secret
    clientID: nginx-gateway
    issuer: https://host.docker.internal:8443/realms/nginx-gateway
    caCertificateRefs:
      - name: keycloak-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
type: Opaque
data:
  client-secret: k2PKtWlAJSAQDBMrE1B7k9IILqZ5r28J
  ca.crt: 
