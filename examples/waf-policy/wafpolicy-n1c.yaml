apiVersion: gateway.nginx.org/v1alpha1
kind: WAFGatewayBindingPolicy
metadata:
  name: gateway-base-protection
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
  type: N1C
  policySource:
    n1cSource:
      url: https://nginx-tenant9.staging.volterra.us
      namespace: default  # N1C namespace the policy belongs to
      # policyName: "ngfPolicy"
      policyObjectID: pol_I65LrX_WTHGmDEX9qnbVjQ
      policyVersionID: pv_Tm__Iqk5SoWmJgwxiKlHAg
    auth:
      secretRef:
        name: n1c-credentials
  securityLogs:
    - destination:
        type: syslog
        syslog:
          server: syslog-svc.default.svc.cluster.local:514
      logSource:
        n1cSource:
          url: https://nginx-tenant9.staging.volterra.us
          namespace: default  # N1C namespace the log profile belongs to
          profileName: "secops_dashboard"
          # profileObjectID: "lp_8s8uZxLpThWwEGF7LTn_rA"
        auth:
          secretRef:
            name: n1c-credentials
