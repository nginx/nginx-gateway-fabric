name: Mend

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
    paths-ignore:
      - design/**
      - deploy**
      - docs/**
      - examples/**
  pull_request:
    branches:
      - main
      - release-*
    paths-ignore:
      - design/**
      - deploy**
      - docs/**
      - examples/**

concurrency:
  group: ${{ github.ref_name }}-mend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mend:
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'push' && github.event.repository.fork == false) }}
    uses: nginx/compliance-rules/.github/workflows/mend.yml@f7c1b54b34eade478560c7fd5300b7e6b6bf1b07 # v0.3.2
    secrets: inherit
    with:
      product_name: nginx-gateway-fabric_${{ github.ref_name }}
      project_name: nginx-gateway-fabric
