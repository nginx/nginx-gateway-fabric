[package]
name = "guardrails_filter"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["F5 AI Guardrails Contributors"]
description = "Rust NGINX module for streaming LLM response inspection with Calypso Guardrails"

[lib]
name = "ai_guardrails"
# cdylib produces the .so for nginx; rlib is needed for `cargo test` to link the test harness
crate-type = ["cdylib", "rlib"]

[dependencies]
ngx = { version = "0.5", features = ["async"] }
nginx-sys = "0.5"
tokio = { version = "1", default-features = false, features = ["rt", "rt-multi-thread", "time"] }
http = "1"
bytes = "1"
paste = "1.0"
libc = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"] }
once_cell = "1.21"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
httpmock = "0.7"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
