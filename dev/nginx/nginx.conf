mgmt {
    # NGINX Plus license token mounted at /etc/nginx/license.jwt
    license_token /etc/nginx/license.jwt;
    # Avoid gating startup on usage report in local dev
    enforce_initial_report off;
    usage_report endpoint=product.connect.nginx.com;
}

# Write PID to a writable location for UID 101 (nginx user in image)
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Use Kubernetes cluster DNS IP for name resolution inside the cluster
    # (CoreDNS/kube-dns Service IP discovered via kubectl)
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    upstream nginx-hello-backend {
        server nginx-hello-service:8080;
    }

    server {
        listen 80;

        location /health {
            return 200 "OK\n";
        }

        location / {
            proxy_pass http://nginx-hello-backend;
        }

        # JWT-protected endpoint (requires NGINX Plus)
        location /auth {
            auth_jwt "master";
            # Dynamically fetch keys from Keycloak via internal subrequest
            auth_jwt_key_request /_jwks;
            proxy_pass http://nginx-hello-backend;
        }

        # Internal location to retrieve OpenID configuration (which includes jwks_uri)
        location = /_jwks {
            internal;
            proxy_pass http://keycloak.default.svc.cluster.local:8080/realms/master/protocol/openid-connect/certs;
        }
    }
}
