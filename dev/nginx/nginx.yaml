---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: default
  labels:
    app: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
      - name: nginx
        image: private-registry.nginx.com/nginx-plus/base:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-run
          mountPath: /var/run/nginx
        - name: nginx-plus-license
          mountPath: /etc/nginx/license.jwt
          subPath: license.jwt
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: nginx-run
        emptyDir: {}
      - name: nginx-plus-license
        secret:
          secretName: nginx-plus-license

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello
  namespace: default
  labels:
    app: nginx-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-hello
  template:
    metadata:
      labels:
        app: nginx-hello
    spec:
      containers:
      - name: nginx-hello
        image: nginxdemos/nginx-hello:plain-text
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-hello-service
  namespace: default
spec:
  selector:
    app: nginx-hello
  ports:
  - port: 8080
    targetPort: 8080
